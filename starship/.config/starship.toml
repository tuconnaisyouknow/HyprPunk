Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
