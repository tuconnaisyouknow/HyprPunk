Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
NixOS = "¾▒äà"

[username]
show_always = true
style_user = "bg:surface0 fg:lavender"
style_root = "bg:surface0 fg:red"
format = '[ $user]($style)'

[custom.local_spacer]
when = 'test -z "$SSH_CONNECTION$SSH_TTY$SSH_CLIENT"'
format = '[ ](bg:surface0 fg:lavender)'

[hostname]
ssh_only = true
ssh_symbol = "¾░ó╣ "
format = "[@$hostname ](bg:surface0 fg:lavender)[$ssh_symbol](bg:surface0 fg:lavender)"

[directory]
style = "fg:base bg:mauve"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "´à£ "
"Downloads" = "´ÇÖ "
"GitHub" = "´éø "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
"Public" = "´âÇ "
"Templates" = "´Çû "
"Videos" = "´Ç¢ "

[git_branch]
symbol = "´Éÿ"
style = "bg:lavender"
format = '[[ $symbol $branch ](fg:base bg:lavender)]($style)'

[git_status]
style = "bg:lavender"
format = '[[($all_status$ahead_behind )](fg:base bg:lavender)]($style)'
up_to_date = '[ Ô£ô](bg:lavender fg:base)'
untracked = '[?\($count\)](bg:lavender fg:base)'
stashed = '[\$](bg:lavender fg:base)'
modified = '[!\($count\)](bg:lavender fg:base)'
renamed = '[┬╗\($count\)](bg:lavender fg:base)'
deleted = '[Ô£ÿ\($count\)](bg:lavender fg:base)'
staged = '[++\($count\)](bg:lavender fg:base)'
ahead = '[Ôçí\(${count}\)](bg:lavender fg:base)'
diverged = 'Ôçò[\[](bg:lavender fg:base)[Ôçí\(${ahead_count}\)](bg:lavender fg:base)[Ôçú\(${behind_count}\)](bg:lavender fg:base)[\]](bg:lavender fg:base)'
behind = '[Ôçú\(${count}\)](bg:lavender fg:base)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:sky"
format = '[[ $symbol( $version) ](fg:base bg:sky)]($style)'

